---
postgresql_port: 5432
postgresql_address: "'*'"

# Modules
postgresql_user_enable: true
postgresql_database_enable: true
postgresql_ssl_enable: true
postgresql_oauth_enable: false
postgresql_wal_enable: false

# User configuration
postgresql_users:
  - { name: "easysec", password: "", superuser: true }
  - { name: "manager-easysec", password: "", superuser: false }

# Database configuration
postgresql_databases:
  - { name: "easysec", owner: "manager-easysec", encoding: "UTF-8" }

# SSL configuration - PostgreSQL connections + SSL role (refer to roles/ssl/README.md)
postgresql_ssl:
  cert_path: "{{ postgresql_config_dir }}/server.crt"
  key_path: "{{ postgresql_config_dir }}/server.key"
  enable_dns: false
  provider: "cloudflare"
  credentials:
    token: "token1234"
  generate: true
  generate_config:
    domain: "postgresql.easysec.x"
    output_path: "{{ postgresql_ssl.cert_path }}"
    privatekey_path: "{{ postgresql_ssl.key_path }}"
    email: "admin@postgresql.easysec.x"
    owner: "{{ postgresql_user }}"
    group: "{{ postgresql_group }}"

# Oauth configuration - PostgreSQL connection
postgresql_oauth:
  provider: kc_validator
  endpoint: https://<keycloak>/realms/<realm>/protocol/openid-connect/token
  audience: postgres-resource
  resource_name: appdb
  client_id: postgres-resource
  http_timeout: 2000
  issuer: https://<keycloak>/realms/<realm>

# WAL configuration
postgresql_wal:
  level: "replica"
  max_size: "1GB"
  min_size: "80MB"
  max_senders: 10
  max_replicas: 10

# Access configuration - Updates PG_HBA template
postgresql_hba_entries:
  - { type: "local", database: "all", user: "postgres", address: "", method: "peer" }
  - { type: "hostssl", database: "all", user: "all", address: "0.0.0.0/0", method: "scram-sha-256" }
  - { type: "host", database: "all", user: "all", address: "0.0.0.0/0", method: "reject" }

# Config envs - Should not be changed unless knowing what they do
postgresql_package_name: postgresql
postgresql_version: 18
postgresql_user: postgres
postgresql_group: postgres

postgresql_key_url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
postgresql_key_path: "/etc/apt/keyrings/{{ postgresql_package_name }}.asc"
postgresql_repo_url: https://apt.postgresql.org/pub/repos/apt
postgresql_apt_source: /etc/apt/sources.list.d/pgdg.sources

postgresql_data_dir: /var/lib/postgresql/{{ postgresql_version }}/main
postgresql_config_dir: /etc/postgresql/{{ postgresql_version }}/main
postgresql_conf_path: "{{ postgresql_config_dir }}/postgresql.conf"
postgresql_hba_path: "{{ postgresql_config_dir }}/pg_hba.conf"
postgresql_indent_path: "{{ postgresql_config_dir }}/pg_ident.conf"
postgresql_log_dir: /var/log/postgresql

postgresql_unix_socket_dir: /var/run/postgresql

postgresql_shared_buffers: "{{ (ansible_facts['memtotal_mb'] * 0.25) | int }}MB"
postgresql_sysctl_params:
  - { name: "vm.overcommit_memory", value: "2" }
  - { name: "vm.overcommit_ratio", value: "80" }
  - { name: "vm.nr_hugepages", value: "{{ ((ansible_facts['memtotal_mb'] * 0.25 / 2) * 1.1) | int }}" }
