---
- name: Create Keycloak group
  ansible.builtin.group:
    name: "{{ keycloak_group }}"
    system: true
    state: present

- name: Create Keycloak user
  ansible.builtin.user:
    name: "{{ keycloak_user }}"
    group: "{{ keycloak_group }}"
    system: true
    shell: /sbin/nologin
    home: "{{ keycloak_path }}"
    create_home: false

- name: Moves files to correct directory
  block:
    - name: Creates software directory
      ansible.builtin.file:
        path: "{{ keycloak_path }}"
        state: directory
        owner: "{{ keycloak_user }}"
        group: "{{ keycloak_group }}"
        mode: "0750"

    - name: Decompress file
      ansible.builtin.unarchive:
        src: /tmp/keycloak.tar.gz
        dest: "{{ keycloak_path }}"
        extra_opts:
          - "--strip-components=1"
        remote_src: true

    - name: Remove Keycloak archive
      ansible.builtin.file:
        path: "/tmp/keycloak.tar.gz"
        state: absent

- name: Log directory creation
  ansible.builtin.file:
    path: "{{ keycloak_log_dir }}"
    owner: "{{ keycloak_user }}"
    group: "{{ keycloak_group }}"
    state: directory
    mode: "755"

- name: Config directory creation
  ansible.builtin.file:
    path: "{{ keycloak_config_dir }}"
    owner: "{{ keycloak_user }}"
    group: "{{ keycloak_group }}"
    state: directory
    mode: "750"

- name: Deploy Keycloak configuration
  ansible.builtin.template:
    src: templates/keycloak.conf.j2
    dest: "{{ keycloak_config_path }}"
    owner: "{{ keycloak_user }}"
    group: "{{ keycloak_group }}"
    mode: "0640"
  notify:
    - Restart Keycloak

- name: Deploy systemd service
  ansible.builtin.template:
    src: templates/service.conf.j2
    dest: "{{ keycloak_systemd_path }}"
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload daemon
    - Restart Keycloak
